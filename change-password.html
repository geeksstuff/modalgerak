<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ubah Password - ModalGerak AI Landing Page Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['"Plus Jakarta Sans"', 'Inter', 'system-ui', 'sans-serif'] } } }
    }
  </script>
  <style>
    ::selection { background: #2d8a4e; color: #fff; }
    body {
      background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 20%, #e0f2fe 50%, #f0fdf4 80%, #f8fafc 100%);
      min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(45,138,78,0.1) 0%, transparent 50%), radial-gradient(circle at 70% 70%, rgba(26,48,80,0.07) 0%, transparent 50%), radial-gradient(circle at 50% 50%, rgba(74,222,128,0.06) 0%, transparent 40%);
      pointer-events: none; z-index: 0; animation: bgShift 20s ease-in-out infinite alternate;
    }
    @keyframes bgShift { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(-2%,-2%) scale(1.04)} }
    body > * { position: relative; z-index: 1; }
    .glass-card { background:rgba(255,255,255,0.65); border:1px solid rgba(255,255,255,0.8); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); box-shadow:0 8px 40px rgba(0,0,0,0.06),0 1px 3px rgba(0,0,0,0.04),inset 0 1px 0 rgba(255,255,255,0.6); }
    .form-input { background:rgba(255,255,255,0.7); border:1px solid #e2e8f0; color:#1e293b; transition:all 0.25s ease; backdrop-filter:blur(8px); }
    .form-input:focus { border-color:#2d8a4e; outline:none; box-shadow:0 0 0 3px rgba(45,138,78,0.12); background:rgba(255,255,255,0.9); }
    .form-input::placeholder { color: #94a3b8; }
    .btn-primary { background:linear-gradient(135deg,#2d8a4e 0%,#1a6b33 100%); box-shadow:0 4px 20px rgba(45,138,78,0.3); transition:all 0.25s ease; }
    .btn-primary:hover:not(:disabled) { box-shadow:0 6px 28px rgba(45,138,78,0.4); transform:translateY(-1px); }
    .btn-primary:disabled { opacity:0.6; cursor:not-allowed; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    .animate-in { animation: fadeInUp 0.6s ease-out both; }
    .animate-in-delay { animation: fadeInUp 0.6s ease-out 0.15s both; }
    .password-toggle { position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;padding:4px;transition:color 0.2s; }
    .password-toggle:hover { color:#64748b; }
    .strength-bar { height:4px; border-radius:2px; transition:all 0.3s ease; }
    .strength-weak { background:#ef4444; width:33%; }
    .strength-medium { background:#f59e0b; width:66%; }
    .strength-strong { background:#2d8a4e; width:100%; }
  </style>
</head>
<body class="min-h-screen font-sans text-slate-800 flex items-center justify-center px-4 py-12">

  <div style="position:fixed;top:10%;left:5%;width:300px;height:300px;border-radius:50%;background:rgba(45,138,78,0.04);filter:blur(60px);pointer-events:none;z-index:0;"></div>
  <div style="position:fixed;bottom:10%;right:5%;width:400px;height:400px;border-radius:50%;background:rgba(26,48,80,0.03);filter:blur(80px);pointer-events:none;z-index:0;"></div>

  <div class="w-full max-w-md">
    <div class="text-center mb-8 animate-in">
      <div class="flex items-center justify-center mb-5">
        <img src="logo.png" alt="ModalGerak" class="h-14 md:h-16" onerror="this.style.display='none'" />
      </div>
      <h1 class="text-2xl font-extrabold text-slate-800">Ubah Password</h1>
      <p class="text-slate-500 text-sm mt-2">Buat password baru untuk akun Anda</p>
    </div>

    <div class="glass-card rounded-3xl p-8 animate-in-delay" id="formCard">
      <div id="errorMsg" class="hidden mb-5 px-4 py-3 rounded-xl text-sm font-medium" style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);color:#dc2626;">
        <div class="flex items-center gap-2">
          <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd"/></svg>
          <span id="errorText"></span>
        </div>
      </div>

      <div id="formFields">
        <div class="mb-4">
          <label class="block text-[11px] font-bold tracking-wider uppercase text-slate-400 mb-2">Password Baru</label>
          <div class="relative">
            <input id="newPassword" type="password" class="form-input w-full px-4 py-3.5 rounded-xl text-sm pr-12" placeholder="Minimal 8 karakter" />
            <button type="button" id="toggleNew" class="password-toggle" tabindex="-1">
              <svg id="eyeNew" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </button>
          </div>
          <div class="mt-2 flex items-center gap-3">
            <div class="flex-1 h-1 bg-slate-200 rounded-full overflow-hidden"><div id="strengthBar" class="strength-bar" style="width:0%"></div></div>
            <span id="strengthLabel" class="text-[11px] font-semibold text-slate-400">—</span>
          </div>
        </div>
        <div class="mb-6">
          <label class="block text-[11px] font-bold tracking-wider uppercase text-slate-400 mb-2">Konfirmasi Password Baru</label>
          <div class="relative">
            <input id="confirmPassword" type="password" class="form-input w-full px-4 py-3.5 rounded-xl text-sm pr-12" placeholder="Ulangi password baru" />
            <button type="button" id="toggleConfirm" class="password-toggle" tabindex="-1">
              <svg id="eyeConfirm" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </button>
          </div>
          <p id="matchMsg" class="text-xs mt-2 hidden"></p>
        </div>
        <button id="submitBtn" class="btn-primary w-full py-3.5 rounded-xl text-white text-sm font-bold flex items-center justify-center gap-2 cursor-pointer">
          <span id="submitBtnText">Simpan Password Baru</span>
          <svg id="submitSpinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </button>
      </div>

      <div id="successState" class="hidden text-center py-6">
        <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4" style="background:rgba(45,138,78,0.1);">
          <svg class="w-8 h-8" fill="none" stroke="#2d8a4e" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        </div>
        <h3 class="text-lg font-bold text-slate-800 mb-2">Password Berhasil Diubah!</h3>
        <p class="text-sm text-slate-500 mb-6">Password Anda telah berhasil diperbarui.</p>
        <a href="index.html" class="btn-primary inline-flex items-center gap-2 px-8 py-3 rounded-xl text-white text-sm font-bold no-underline">← Kembali ke Generator</a>
      </div>
    </div>

    <div class="text-center mt-5 animate-in-delay"><a href="index.html" class="text-sm font-semibold no-underline hover:underline" style="color:#2d8a4e;">← Kembali ke Generator</a></div>
    <p class="text-center text-xs text-slate-400 mt-6 animate-in-delay">© 2026 ModalGerak. All rights reserved.</p>
  </div>

  <script>
    var sb = window.supabase.createClient(
      'https://scwdjnicrygjamerlswu.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjd2RqbmljcnlnamFtZXJsc3d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjY5OTMsImV4cCI6MjA4ODg0Mjk5M30.1ovA8C9DgTp9_Wv8mV9LKfTCa7LY0uKF78yJWEbFeZ0'
    );

    sb.auth.getSession().then(function(result) {
      if (!result.data.session) { window.location.href = 'login.html'; }
    });

    var newPwInput = document.getElementById('newPassword');
    var confirmPwInput = document.getElementById('confirmPassword');

    newPwInput.addEventListener('input', updateStrength);
    confirmPwInput.addEventListener('input', checkMatch);
    newPwInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') confirmPwInput.focus(); });
    confirmPwInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') handleChangePassword(); });
    document.getElementById('submitBtn').addEventListener('click', handleChangePassword);
    document.getElementById('toggleNew').addEventListener('click', function() { toggleVis('newPassword', 'eyeNew'); });
    document.getElementById('toggleConfirm').addEventListener('click', function() { toggleVis('confirmPassword', 'eyeConfirm'); });

    function showError(msg) { document.getElementById('errorText').textContent = msg; document.getElementById('errorMsg').classList.remove('hidden'); }
    function hideError() { document.getElementById('errorMsg').classList.add('hidden'); }

    function setLoading(loading) {
      document.getElementById('submitBtn').disabled = loading;
      document.getElementById('submitBtnText').textContent = loading ? 'Memproses...' : 'Simpan Password Baru';
      document.getElementById('submitSpinner').classList.toggle('hidden', !loading);
    }

    function toggleVis(inputId, iconId) {
      var input = document.getElementById(inputId);
      var icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />';
      }
    }

    function updateStrength() {
      var pw = newPwInput.value;
      var bar = document.getElementById('strengthBar');
      var label = document.getElementById('strengthLabel');
      var score = 0;
      if (pw.length >= 8) score++;
      if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      bar.className = 'strength-bar';
      if (pw.length === 0) { bar.style.width = '0%'; label.textContent = '—'; label.className = 'text-[11px] font-semibold text-slate-400'; }
      else if (score <= 1) { bar.classList.add('strength-weak'); label.textContent = 'Lemah'; label.className = 'text-[11px] font-semibold text-red-500'; }
      else if (score <= 2) { bar.classList.add('strength-medium'); label.textContent = 'Sedang'; label.className = 'text-[11px] font-semibold text-amber-500'; }
      else { bar.classList.add('strength-strong'); label.textContent = 'Kuat'; label.className = 'text-[11px] font-semibold text-green-600'; }
      checkMatch();
    }

    function checkMatch() {
      var pw = newPwInput.value;
      var confirm = confirmPwInput.value;
      var msg = document.getElementById('matchMsg');
      if (!confirm) { msg.classList.add('hidden'); return; }
      msg.classList.remove('hidden');
      if (pw === confirm) { msg.textContent = '✓ Password cocok'; msg.className = 'text-xs mt-2 text-green-600 font-medium'; }
      else { msg.textContent = '✗ Password tidak cocok'; msg.className = 'text-xs mt-2 text-red-500 font-medium'; }
    }

    function handleChangePassword() {
      hideError();
      var newPw = newPwInput.value;
      var confirmPw = confirmPwInput.value;
      if (!newPw) { showError('Silakan masukkan password baru.'); return; }
      if (newPw.length < 8) { showError('Password minimal 8 karakter.'); return; }
      if (newPw !== confirmPw) { showError('Password dan konfirmasi tidak cocok.'); return; }
      setLoading(true);
      sb.auth.updateUser({ password: newPw }).then(function(result) {
        if (result.error) { setLoading(false); showError('Gagal mengubah password: ' + result.error.message); return; }
        document.getElementById('formFields').classList.add('hidden');
        document.getElementById('successState').classList.remove('hidden');
        hideError();
      });
    }
  </script>
</body>
</html>
