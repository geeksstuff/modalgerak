<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - ModalGerak AI Landing Page Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['"Plus Jakarta Sans"', 'Inter', 'system-ui', 'sans-serif'] } } }
    }
  </script>
  <style>
    ::selection { background: #2d8a4e; color: #fff; }
    body {
      background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 20%, #e0f2fe 50%, #f0fdf4 80%, #f8fafc 100%);
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background:
        radial-gradient(circle at 30% 30%, rgba(45, 138, 78, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 70% 70%, rgba(26, 48, 80, 0.07) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(74, 222, 128, 0.06) 0%, transparent 40%);
      pointer-events: none; z-index: 0;
      animation: bgShift 20s ease-in-out infinite alternate;
    }
    @keyframes bgShift { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-2%, -2%) scale(1.04); } }
    body > * { position: relative; z-index: 1; }
    .glass-card {
      background: rgba(255, 255, 255, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.6);
    }
    .form-input {
      background: rgba(255, 255, 255, 0.7); border: 1px solid #e2e8f0;
      color: #1e293b; transition: all 0.25s ease; backdrop-filter: blur(8px);
    }
    .form-input:focus { border-color: #2d8a4e; outline: none; box-shadow: 0 0 0 3px rgba(45,138,78,0.12); background: rgba(255,255,255,0.9); }
    .form-input::placeholder { color: #94a3b8; }
    .btn-primary {
      background: linear-gradient(135deg, #2d8a4e 0%, #1a6b33 100%);
      box-shadow: 0 4px 20px rgba(45,138,78,0.3); transition: all 0.25s ease;
    }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 6px 28px rgba(45,138,78,0.4); transform: translateY(-1px); }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    .animate-in { animation: fadeInUp 0.6s ease-out both; }
    .animate-in-delay { animation: fadeInUp 0.6s ease-out 0.15s both; }
    .shake { animation: shake 0.4s ease-in-out; }
    .password-toggle { position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;padding:4px;transition:color 0.2s; }
    .password-toggle:hover { color: #64748b; }
    .divider { display:flex;align-items:center;gap:16px;color:#94a3b8;font-size:12px; }
    .divider::before,.divider::after { content:'';flex:1;height:1px;background:#e2e8f0; }
  </style>
</head>
<body class="min-h-screen font-sans text-slate-800 flex items-center justify-center px-4 py-12">

  <div style="position:fixed;top:10%;left:5%;width:300px;height:300px;border-radius:50%;background:rgba(45,138,78,0.04);filter:blur(60px);pointer-events:none;z-index:0;"></div>
  <div style="position:fixed;bottom:10%;right:5%;width:400px;height:400px;border-radius:50%;background:rgba(26,48,80,0.03);filter:blur(80px);pointer-events:none;z-index:0;"></div>

  <div class="w-full max-w-md">
    <div class="text-center mb-8 animate-in">
      <div class="flex items-center justify-center mb-5">
        <img src="logo.png" alt="ModalGerak" class="h-14 md:h-16" onerror="this.style.display='none'" />
      </div>
      <h1 class="text-2xl font-extrabold text-slate-800">Selamat Datang Kembali</h1>
      <p class="text-slate-500 text-sm mt-2">Masuk ke akun Anda untuk mengakses AI Landing Page Generator</p>
    </div>

    <div class="glass-card rounded-3xl p-8 animate-in-delay" id="loginCard">
      <div id="errorMsg" class="hidden mb-5 px-4 py-3 rounded-xl text-sm font-medium" style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);color:#dc2626;">
        <div class="flex items-center gap-2">
          <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd"/></svg>
          <span id="errorText"></span>
        </div>
      </div>
      <div id="successMsg" class="hidden mb-5 px-4 py-3 rounded-xl text-sm font-medium" style="background:rgba(45,138,78,0.08);border:1px solid rgba(45,138,78,0.15);color:#1a6b33;">
        <div class="flex items-center gap-2">
          <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd"/></svg>
          <span id="successText"></span>
        </div>
      </div>

      <div class="mb-4">
        <label for="email" class="block text-[11px] font-bold tracking-wider uppercase text-slate-400 mb-2">Email</label>
        <input id="email" type="email" class="form-input w-full px-4 py-3.5 rounded-xl text-sm" placeholder="nama@email.com" autocomplete="email" />
      </div>
      <div class="mb-6">
        <label for="password" class="block text-[11px] font-bold tracking-wider uppercase text-slate-400 mb-2">Password</label>
        <div class="relative">
          <input id="password" type="password" class="form-input w-full px-4 py-3.5 rounded-xl text-sm pr-12" placeholder="Masukkan password Anda" autocomplete="current-password" />
          <button type="button" class="password-toggle" id="toggleBtn" tabindex="-1">
            <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </button>
        </div>
      </div>

      <button id="loginBtn" class="btn-primary w-full py-3.5 rounded-xl text-white text-sm font-bold flex items-center justify-center gap-2 cursor-pointer">
        <span id="loginBtnText">Masuk</span>
        <svg id="loginSpinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </button>
      <div class="divider my-6">atau</div>
      <div class="text-center">
        <button id="forgotBtn" class="text-sm font-semibold cursor-pointer hover:underline bg-transparent border-none" style="color:#2d8a4e;">Lupa Password?</button>
      </div>
    </div>

    <p class="text-center text-xs text-slate-400 mt-6 animate-in-delay">© 2026 ModalGerak. All rights reserved.</p>
  </div>

  <script>
    // Use a different variable name to avoid conflict with window.supabase from CDN
    var sb = window.supabase.createClient(
      'https://scwdjnicrygjamerlswu.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjd2RqbmljcnlnamFtZXJsc3d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjY5OTMsImV4cCI6MjA4ODg0Mjk5M30.1ovA8C9DgTp9_Wv8mV9LKfTCa7LY0uKF78yJWEbFeZ0'
    );

    // Check if already logged in
    sb.auth.getSession().then(function(result) {
      if (result.data.session) { window.location.href = 'index.html'; }
    });

    // DOM refs
    var emailInput = document.getElementById('email');
    var passwordInput = document.getElementById('password');
    var loginBtn = document.getElementById('loginBtn');
    var forgotBtn = document.getElementById('forgotBtn');
    var toggleBtn = document.getElementById('toggleBtn');

    // Event listeners
    emailInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') passwordInput.focus(); });
    passwordInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') handleLogin(); });
    loginBtn.addEventListener('click', handleLogin);
    forgotBtn.addEventListener('click', handleForgotPassword);
    toggleBtn.addEventListener('click', togglePasswordVisibility);

    function showError(msg) {
      document.getElementById('successMsg').classList.add('hidden');
      document.getElementById('errorText').textContent = msg;
      document.getElementById('errorMsg').classList.remove('hidden');
      document.getElementById('loginCard').classList.add('shake');
      setTimeout(function() { document.getElementById('loginCard').classList.remove('shake'); }, 500);
    }

    function showSuccess(msg) {
      document.getElementById('errorMsg').classList.add('hidden');
      document.getElementById('successText').textContent = msg;
      document.getElementById('successMsg').classList.remove('hidden');
    }

    function setLoading(loading) {
      loginBtn.disabled = loading;
      document.getElementById('loginBtnText').textContent = loading ? 'Memproses...' : 'Masuk';
      document.getElementById('loginSpinner').classList.toggle('hidden', !loading);
    }

    function togglePasswordVisibility() {
      var input = passwordInput;
      var icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />';
      }
    }

    function handleLogin() {
      document.getElementById('errorMsg').classList.add('hidden');
      document.getElementById('successMsg').classList.add('hidden');
      var email = emailInput.value.trim();
      var password = passwordInput.value;
      if (!email) { showError('Silakan masukkan email Anda.'); return; }
      if (!password) { showError('Silakan masukkan password Anda.'); return; }
      setLoading(true);
      sb.auth.signInWithPassword({ email: email, password: password }).then(function(result) {
        if (result.error) {
          setLoading(false);
          if (result.error.message.indexOf('Invalid login') !== -1) {
            showError('Email atau password salah. Silakan coba lagi.');
          } else if (result.error.message.indexOf('Email not confirmed') !== -1) {
            showError('Email belum dikonfirmasi. Hubungi admin.');
          } else {
            showError(result.error.message);
          }
          return;
        }
        showSuccess('Login berhasil! Mengalihkan...');
        setTimeout(function() { window.location.href = 'index.html'; }, 600);
      });
    }

    function handleForgotPassword() {
      var email = emailInput.value.trim();
      if (!email) {
        showError('Masukkan email Anda terlebih dahulu, lalu klik "Lupa Password".');
        emailInput.focus();
        return;
      }
      forgotBtn.textContent = 'Mengirim...';
      forgotBtn.disabled = true;
      sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname.replace('login.html', 'change-password.html'),
      }).then(function(result) {
        if (result.error) {
          showError('Gagal mengirim email reset: ' + result.error.message);
        } else {
          showSuccess('Link reset password telah dikirim ke email Anda.');
        }
        forgotBtn.textContent = 'Lupa Password?';
        forgotBtn.disabled = false;
      });
    }
  </script>
</body>
</html>
